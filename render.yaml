services:
  - type: web
    name: study-buddy-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://placeholder.vercel.app
      - key: JWT_SECRET
        generateValue: true
